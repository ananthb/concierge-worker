name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Write production config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          CF_ACCESS_TEAM: ${{ secrets.CF_ACCESS_TEAM }}
          CF_ACCESS_AUD: ${{ secrets.CF_ACCESS_AUD }}
          WHATSAPP_WABA_ID: ${{ secrets.WHATSAPP_WABA_ID }}
          WHATSAPP_SIGNUP_CONFIG_ID: ${{ secrets.WHATSAPP_SIGNUP_CONFIG_ID }}
        run: |
          cat > wrangler.production.toml <<EOF
          name = "concierge"
          main = "worker-shim.mjs"
          compatibility_date = "2024-01-01"
          account_id = "${CLOUDFLARE_ACCOUNT_ID}"

          [build]
          command = "worker-build --release"

          [[routes]]
          pattern = "concierge.calculon.tech"
          custom_domain = true

          [[routes]]
          pattern = "cncg.email"
          custom_domain = true

          [[d1_databases]]
          binding = "DB"
          database_name = "concierge"
          database_id = "${D1_DATABASE_ID}"

          [[kv_namespaces]]
          binding = "KV"
          id = "${KV_NAMESPACE_ID}"

          [[durable_objects.bindings]]
          name = "REPLY_BUFFER"
          class_name = "ReplyBufferDO"

          [[durable_objects.bindings]]
          name = "APPROVALS_DO"
          class_name = "ApprovalsDO"

          [[migrations]]
          tag = "v1"
          new_classes = ["ReplyBufferDO"]

          [[migrations]]
          tag = "v2"
          new_classes = ["ApprovalsDO"]

          [ai]
          binding = "AI"

          [[send_email]]
          name = "EMAIL"

          [[queues.producers]]
          queue = "concierge-safety"
          binding = "SAFETY_QUEUE"

          [[queues.consumers]]
          queue = "concierge-safety"
          max_batch_size = 10
          max_batch_timeout = 5
          max_retries = 3
          dead_letter_queue = "concierge-safety-dlq"

          [vars]
          ENVIRONMENT = "production"
          CF_ACCESS_TEAM = "${CF_ACCESS_TEAM}"
          CF_ACCESS_AUD = "${CF_ACCESS_AUD}"
          WHATSAPP_WABA_ID = "${WHATSAPP_WABA_ID}"
          WHATSAPP_SIGNUP_CONFIG_ID = "${WHATSAPP_SIGNUP_CONFIG_ID}"
          EMAIL_BASE_DOMAIN = "cncg.email"
          # Operator gate: when "true", the rule editor exposes the
          # NoGate radio (skip the risk-gate safety check). Defaults to
          # closed: tenants can't pick NoGate unless we opt in here.
          ALLOW_NO_GATE = "false"

          [triggers]
          # */15 * * * * — approval-digest sweep + 24h expiry.
          # 0 6 * * *    — daily Instagram token refresh.
          crons = ["*/15 * * * *", "0 6 * * *"]

          [observability.logs]
          enabled = true
          invocation_logs = true
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' wrangler.production.toml

      - name: Ensure Queues
        # Idempotent: `wrangler queues create` errors with "already exists"
        # when the queue is already there. We treat that case as success and
        # surface every other failure (auth, network, quota) so the deploy
        # halts before binding to a missing queue.
        run: |
          nix develop --command bash -c '
            set -uo pipefail
            for q in concierge-safety concierge-safety-dlq; do
              out=$(wrangler queues create "$q" 2>&1) && { echo "Created $q"; continue; }
              # Cloudflare API error 11009 fires when the queue already
              # exists. The phrase has been "already taken" / "already
              # exists" / "already in use" across versions, so match all
              # three plus the explicit code.
              if echo "$out" | grep -qiE "already (taken|exist|in use)|code:?\s*11009"; then
                echo "$q already exists"
                continue
              fi
              echo "Failed to create $q:" >&2
              echo "$out" >&2
              exit 1
            done
          '
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply Migrations
        run: nix develop --command wrangler d1 migrations apply concierge --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build and Deploy
        run: nix develop --command wrangler deploy -c wrangler.production.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
