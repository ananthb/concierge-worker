name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Write production config
        run: |
          cat > wrangler.production.toml << 'TOML'
          name = "concierge-worker"
          main = "build/worker/shim.mjs"
          compatibility_date = "2024-01-01"

          [build]
          command = "worker-build --release"

          [[routes]]
          pattern = "concierge.calculon.tech"
          custom_domain = true

          [[d1_databases]]
          binding = "DB"
          database_name = "concierge-worker"
          database_id = "${{ secrets.D1_DATABASE_ID }}"

          [[kv_namespaces]]
          binding = "KV"
          id = "${{ secrets.KV_NAMESPACE_ID }}"

          [ai]
          binding = "AI"

          [[send_email]]
          name = "EMAIL"

          [vars]
          ENVIRONMENT = "production"
          CF_ACCESS_TEAM = "${{ secrets.CF_ACCESS_TEAM }}"
          CF_ACCESS_AUD = "${{ secrets.CF_ACCESS_AUD }}"
          WHATSAPP_WABA_ID = "${{ secrets.WHATSAPP_WABA_ID }}"
          WHATSAPP_SIGNUP_CONFIG_ID = "${{ secrets.WHATSAPP_SIGNUP_CONFIG_ID }}"

          [triggers]
          crons = ["0 6 * * *"]

          [observability.logs]
          enabled = true
          invocation_logs = true
          TOML

      - name: Build and Deploy
        run: nix develop --command wrangler deploy -c wrangler.production.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
