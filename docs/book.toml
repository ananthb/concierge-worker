[book]
title = "Concierge"
authors = ["Ananth Bhaskararaman"]
language = "en"
src = "src"
description = "Automated customer engagement for small businesses. WhatsApp replies, event calendars, Instagram integration — zero effort."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/ananthb/concierge-worker"
edit-url-template = "https://github.com/ananthb/concierge-worker/edit/main/docs/{path}"
site-url = "/"
