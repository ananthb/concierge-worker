name = "concierge-worker"
main = "worker-shim.mjs"
compatibility_date = "2024-01-01"

[build]
command = "worker-build --release"

# ============================================================================
# D1 Database for messages and submissions
# ============================================================================
[[d1_databases]]
binding = "DB"
database_name = "concierge-worker"
database_id = "332c2ee6-05c9-4293-9df3-51e61238b61a"

# ============================================================================
# KV Namespace for configs
# ============================================================================
[[kv_namespaces]]
binding = "KV"
id = "2c2f474d22e04d1f8a4d12b37810390b"

# ============================================================================
# Durable Objects — buffer inbound messages so we can reply to a batch
# ============================================================================
[[durable_objects.bindings]]
name = "REPLY_BUFFER"
class_name = "ReplyBufferDO"

[[migrations]]
tag = "v1"
new_classes = ["ReplyBufferDO"]

# ============================================================================
# AI Binding for auto-reply generation
# ============================================================================
[ai]
binding = "AI"

# ============================================================================
# Email Routing — send_email binding for outbound forwarding
# ============================================================================
[[send_email]]
name = "EMAIL"

[vars]
ENVIRONMENT = "production"
CF_ACCESS_TEAM = ""             # Your Cloudflare Access team name (e.g. "myteam")
CF_ACCESS_AUD = ""              # Application Audience (AUD) tag from Access application
AI_MODEL = ""                    # Workers AI model for replies (default: llama-4-scout-17b-16e-instruct)
AI_FAST_MODEL = ""               # Workers AI model for injection scanning (default: llama-3.1-8b-instruct-fast)
WHATSAPP_WABA_ID = ""           # Your WhatsApp Business Account ID
WHATSAPP_SIGNUP_CONFIG_ID = ""  # Meta Embedded Signup config ID
EMAIL_ZONE_ID = "5cf43b684849d5805eb0a115a18dbee2" # Cloudflare zone ID for cncg.email
EMAIL_BASE_DOMAIN = "cncg.email" # Base domain for tenant subdomains

# ============================================================================
# Cron triggers — daily at 6AM UTC for Instagram token refresh
# ============================================================================
[triggers]
crons = ["0 6 * * *"]

[observability.logs]
enabled = true
invocation_logs = true

# ============================================================================
# Required Secrets (set via wrangler secret put <NAME>)
# ============================================================================
#
# Encryption:
#   ENCRYPTION_KEY          - 32-byte hex key for AES-256-GCM token encryption
#
# Google OAuth (login only):
#   GOOGLE_OAUTH_CLIENT_ID     - Google OAuth client ID
#   GOOGLE_OAUTH_CLIENT_SECRET - Google OAuth client secret
#
# WhatsApp Business (platform WABA token):
#   WHATSAPP_ACCESS_TOKEN   - System user token for the shared WABA
#   WHATSAPP_VERIFY_TOKEN   - Webhook verification token
#
# Meta (Facebook/Instagram/WhatsApp login + APIs):
#   META_APP_ID             - Meta app ID (shared for Facebook Login, Instagram, WhatsApp)
#   META_APP_SECRET         - Meta app secret
#   INSTAGRAM_VERIFY_TOKEN  - Instagram DM webhook verification token
#
# Discord:
#   DISCORD_PUBLIC_KEY      - Discord application public key (Ed25519 verification)
#   DISCORD_APPLICATION_ID  - Discord application ID
#   DISCORD_BOT_TOKEN       - Discord bot token
#
# Razorpay (billing):
#   RAZORPAY_KEY_ID         - Razorpay key ID
#   RAZORPAY_KEY_SECRET     - Razorpay key secret
#   RAZORPAY_WEBHOOK_SECRET - Razorpay webhook secret (for payment.captured events)
#
# Cloudflare DNS (email subdomain provisioning):
#   CF_DNS_API_TOKEN        - Cloudflare API token scoped to DNS edit on the email zone
