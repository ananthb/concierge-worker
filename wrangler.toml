name = "concierge"
main = "worker-shim.mjs"
compatibility_date = "2024-01-01"

[build]
command = "worker-build --release"

# ============================================================================
# D1 Database for messages and submissions.
# Forks: replace `database_id` with your own from `wrangler d1 create`.
# ============================================================================
[[d1_databases]]
binding = "DB"
database_name = "concierge"
database_id = "95687fdd-d529-4993-8b84-e55db87159c2"

# ============================================================================
# KV Namespace for configs. `id` bound via dashboard / Deploy button.
# ============================================================================
[[kv_namespaces]]
binding = "KV"

# ============================================================================
# Durable Objects:
#   REPLY_BUFFER  — buffers inbound messages so we can reply to a batch.
#   APPROVALS_DO  — per-tenant SSE fan-out for the approvals page. One DO
#                   instance per tenant_id; each open browser tab
#                   subscribes via GET /admin/approvals/stream, the worker
#                   forwards to the DO, the DO holds a WritableStream per
#                   client and pings them when an approval is enqueued or
#                   resolved.
# ============================================================================
[[durable_objects.bindings]]
name = "REPLY_BUFFER"
class_name = "ReplyBufferDO"

[[durable_objects.bindings]]
name = "APPROVALS_DO"
class_name = "ApprovalsDO"

[[migrations]]
tag = "v1"
new_classes = ["ReplyBufferDO"]

[[migrations]]
tag = "v2"
new_classes = ["ApprovalsDO"]

# ============================================================================
# AI Binding for auto-reply generation
# ============================================================================
[ai]
binding = "AI"

# ============================================================================
# Queues: persona safety classifier
#
# Producer: the persona admin handler enqueues a SafetyJob whenever a tenant
# saves a new persona prompt.
#
# Consumer: src/safety_queue.rs:handle_batch (wired via #[event(queue)] in
# src/lib.rs) re-reads the persona, runs the classifier, and writes the
# verdict back. Failed jobs go to the DLQ after 3 retries.
#
# Both queues must exist before deploy:
#   wrangler queues create concierge-safety
#   wrangler queues create concierge-safety-dlq
# ============================================================================
[[queues.producers]]
queue = "concierge-safety"
binding = "SAFETY_QUEUE"

[[queues.consumers]]
queue = "concierge-safety"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "concierge-safety-dlq"

# ============================================================================
# Email Routing: send_email binding for outbound forwarding
# ============================================================================
[[send_email]]
name = "EMAIL"

[vars]
ENVIRONMENT = "production"
EMAIL_BASE_DOMAIN = "cncg.email" # Single platform email domain. MX records on the apex.

# ============================================================================
# Cron triggers:
#   "*/15 * * * *" — approval-digest sweep: scan pending_approvals, send
#                    digest emails to tenants whose cadence is due, expire
#                    stale rows past 24h.
#   "0 6 * * *"    — daily Instagram token refresh.
# scheduled.rs dispatches on event.cron().
# ============================================================================
[triggers]
crons = ["*/15 * * * *", "0 6 * * *"]

[observability.logs]
enabled = true
invocation_logs = true

# ============================================================================
# Per-deployment configuration
# ============================================================================
# All runtime vars and secrets (apart from the static defaults above) are
# managed in the Cloudflare dashboard (Workers → concierge → Settings →
# Variables and Secrets) so this file stays portable for forks. Cloudflare
# Builds redeploys preserve them.
#
# Plain-text variables (Settings → Variables):
#   CF_ACCESS_TEAM             Cloudflare Access team name (e.g. "myteam")
#   CF_ACCESS_AUD              Application Audience (AUD) tag from Access app
#   AI_MODEL                   Workers AI reply model (default llama-4-scout-17b-16e-instruct)
#   AI_FAST_MODEL              Workers AI scanning model (default llama-3.1-8b-instruct-fast)
#   WHATSAPP_WABA_ID           WhatsApp Business Account ID
#   WHATSAPP_SIGNUP_CONFIG_ID  Meta Embedded Signup config ID
#
# Secrets (Settings → Secrets):
#   ENCRYPTION_KEY             32-byte hex key for AES-256-GCM token encryption
#   GOOGLE_OAUTH_CLIENT_ID     Google OAuth client ID
#   GOOGLE_OAUTH_CLIENT_SECRET Google OAuth client secret
#   WHATSAPP_ACCESS_TOKEN      System user token for the shared WABA
#   WHATSAPP_VERIFY_TOKEN      WhatsApp webhook verification token
#   META_APP_ID                Meta app ID (Facebook Login, Instagram, WhatsApp)
#   META_APP_SECRET            Meta app secret
#   INSTAGRAM_VERIFY_TOKEN     Instagram DM webhook verification token
#   DISCORD_PUBLIC_KEY         Discord Ed25519 verification key
#   DISCORD_APPLICATION_ID     Discord application ID
#   DISCORD_BOT_TOKEN          Discord bot token
#   RAZORPAY_KEY_ID            Razorpay key ID
#   RAZORPAY_KEY_SECRET        Razorpay key secret
#   RAZORPAY_WEBHOOK_SECRET    Razorpay webhook secret
#   CF_DNS_API_TOKEN           Cloudflare API token (DNS edit on email zone)
