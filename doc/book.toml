# mdBook config for the Concierge docs site.
#
# Source markdown lives in src/, custom theme in theme/. Built output lands
# in book/ (gitignored). See `.github/workflows/docs.yml` for the deploy
# pipeline (mdbook build + cargo doc → GitHub Pages).

[book]
title = "Concierge"
description = "Documentation for Concierge — multi-channel messaging automation for small businesses on Cloudflare Workers."
authors = ["Calculon Tech"]
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "light"          # site is light-only; the docs.css palette doesn't have a dark variant
no-section-label = true                 # don't auto-prefix chapters with "1.1.2"
additional-css = ["theme/docs.css"]
git-repository-url = "https://github.com/ananthb/concierge"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/ananthb/concierge/edit/main/doc/{path}"
site-url = "/"

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
